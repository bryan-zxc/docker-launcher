name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Pytest
        run: uv run pytest tests/ -q

  build:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Build exe
        run: uv run pyinstaller docker-launcher.spec --noconfirm

      - name: Zip distribution
        run: Compress-Archive -Path dist/docker-launcher/* -DestinationPath dist/docker-launcher.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/docker-launcher.zip
